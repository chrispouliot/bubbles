# Flatpak manifest for Bubbles.
#
# This is set up for LOCAL builds (flatpak-builder --user), not Flathub: the
# build step is allowed network access so it can fetch crates and download
# protoc. rustpush is vendored under third_party/rustpush (with submodules and
# pre-seeded FairPlay certs), so no build-time clone is needed. Flathub
# requires fully offline/sandboxed builds (declared sources + vendored cargo),
# which is a later step — see flatpak/README.md.
app-id: io.github.chrispouliot.Bubbles

# Match these to what you actually have installed:
#   flatpak list --runtime | grep -E 'gnome|rust-stable'
# The rust-stable extension branch tracks the freedesktop SDK base, not the
# GNOME number — for GNOME 50 (freedesktop 25.08) it's //25.08. The trailing
# //25.08 is required: without an explicit branch, sdk-extensions inherit the
# runtime's branch (50), and rust-stable//50 does not exist on Flathub — the
# build would fail with "no such branch".
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable//25.08

command: bubbles

finish-args:
  - --share=network        # Apple IDS/APNs + your self-hosted relay sidecar (LAN)
  - --share=ipc            # X11 shm (paired with fallback-x11)
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=session-bus   # D-Bus session bus (tray + portals)
  - --device=dri           # GTK4 GL rendering
  - --talk-name=org.freedesktop.Notifications   # desktop notifications
  - --talk-name=org.kde.StatusNotifierWatcher   # system tray (ksni)
  - --talk-name=org.freedesktop.portal.OpenURI   # link opening via GIO
  # messages.db + rustpush credentials live under the per-app data dir
  # (XDG_DATA_HOME -> ~/.var/app/io.github.chrispouliot.Bubbles/data/bubbles),
  # which Flatpak sandboxes automatically. No host --filesystem grant needed
  # unless you later want to save attachments outside the sandbox.

build-options:
  build-args:
    - --share=network      # LOCAL ONLY: lets the build fetch crates + protoc
  append-path: /usr/lib/sdk/rust-stable/bin

modules:
  # gst-plugins-rs / gtk4paintablesink. The freedesktop-sdk 25.08 runtime
  # (org.gnome.Platform v50) ships gst-libav via the auto-installed
  # codecs-extra extension, but does NOT ship gst-plugins-rs — so the
  # Unit C lightbox's `gtk4paintablesink` has to be built here and installed
  # to /app/lib/gstreamer-1.0/, which gstreamer's compiled-in path picks up
  # automatically at runtime.
  - name: gst-plugins-rs
    buildsystem: simple
    sources:
      - type: archive
        url: https://crates.io/api/v1/crates/gst-plugin-gtk4/0.13.7/download
        dest-filename: gst-plugin-gtk4-0.13.7.tar.gz
        sha256: a4cb890d0df1814d2f61ad7d5a4db8ec4fed0e2ac287af26d3c342be1dfae75b
      - gst-plugin-gtk4-sources.json
    build-options:
      env:
        # Per-module CARGO_HOME under the build dir so this module's
        # crate cache doesn't collide with the bubbles module's cache
        # (which uses .cargo-home, skipped in the bubbles sources below).
        CARGO_HOME: "$FLATPAK_BUILDER_BUILDDIR/cargo"
    build-commands:
      # --prefix=/app installs the .so to /app/lib/gstreamer-1.0/,
      # which gstreamer's compiled-in search path picks up at runtime —
      # no GST_PLUGIN_PATH override needed (unlike the Nix flake's
      # wrapProgram dance, which only exists because Nix's per-store-path
      # layout means gstreamer can't auto-discover the plugin bundles).
      # Features: GL backends for both Wayland (egl) and X11 (glx/egl),
      # plus dmabuf for zero-copy on Linux. The default features
      # disable GL, which the lightbox needs to render frames.
      - cargo cinstall --offline --release --features=waylandegl,x11glx,x11egl,dmabuf --library-type=cdylib --prefix=/app

  - name: bubbles
    buildsystem: simple
    build-commands:
      - bash flatpak/build.sh
    sources:
      # Build straight from the working tree. Switch to a git source once you
      # want reproducible builds.
      - type: dir
        path: .
        skip:
          - target
          - .cargo-home
          - .flatpak-builder
          - build-dir
          - .git
